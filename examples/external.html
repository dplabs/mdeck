<!DOCTYPE html>
<html>
<head>
  <title>mdeck – external markdown file</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles/theme.css">
</head>
<body>
<!--
  No <textarea id="source"> needed — the source is loaded from an external
  Markdown file via the `sourceUrl` option passed to createSlideshow().

  The file is fetched at runtime, so it can be:
    - a relative path:  sourceUrl: 'slides.md'
    - an absolute URL:  sourceUrl: 'https://example.com/deck.md'

  NOTE: When serving from the file system (file://) cross-origin rules
  still apply. Use a local server (e.g. `npx serve examples/`) for
  external URLs, or keep the .md file alongside the HTML.
-->

<script src="../dist/mdeck.umd.cjs"></script>
<script>
  mdeck.createSlideshow({
    sourceUrl: 'slides/external-demo.md'
  });
</script>
</body>
</html>
